<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="112" fill="#1a2332"/>
  <!-- Calendar grid lines -->
  <line x1="80" y1="180" x2="432" y2="180" stroke="#ffffff" stroke-width="4" stroke-opacity="0.1"/>
  <line x1="80" y1="260" x2="432" y2="260" stroke="#ffffff" stroke-width="4" stroke-opacity="0.06"/>
  <line x1="80" y1="340" x2="432" y2="340" stroke="#ffffff" stroke-width="4" stroke-opacity="0.06"/>
  <!-- "b" letter -->
  <text x="96" y="380" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="320" fill="white" opacity="0.95">b</text>
  <!-- Red dot accent -->
  <rect x="80" y="340" width="56" height="56" rx="10" fill="#cd4c38"/>
  <!-- Small calendar pin indicators -->
  <circle cx="380" cy="200" r="12" fill="#22c55e" opacity="0.8"/>
  <circle cx="380" cy="260" r="12" fill="#6264a7" opacity="0.8"/>
  <circle cx="380" cy="320" r="12" fill="#4285f4" opacity="0.8"/>
</svg>
