<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Body: Burti forest-green (dark variant) -->
  <rect x="64" y="64" width="384" height="384" rx="48" fill="#134A40"/>

  <!-- Interior panel (subtle wash) -->
  <rect x="80" y="170" width="352" height="262" rx="24" fill="rgba(255,255,255,0.07)"/>

  <!-- Calendar ring holes (forest-green fills with rowanberry stroke) -->
  <rect x="168" y="42" width="22" height="56" rx="11" fill="#0A4A42" stroke="#CD4C38" stroke-width="3"/>
  <rect x="322" y="42" width="22" height="56" rx="11" fill="#0A4A42" stroke="#CD4C38" stroke-width="3"/>

  <!-- Subtle grid cross -->
  <line x1="256" y1="170" x2="256" y2="432" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="300" x2="432" y2="300" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Day number -->
  <text x="256" y="355" text-anchor="middle" font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="200" fill="#FFFFFF" letter-spacing="-6">31</text>

  <!-- Three fading rowanberry squares under the number -->
  <rect x="218" y="388" width="12" height="12" fill="#CD4C38"/>
  <rect x="250" y="388" width="12" height="12" fill="#CD4C38" opacity="0.6"/>
  <rect x="282" y="388" width="12" height="12" fill="#CD4C38" opacity="0.3"/>

  <!-- Subtle cyan accent dot -->
  <circle cx="112" cy="108" r="6" fill="#00AEE7"/>
</svg>
