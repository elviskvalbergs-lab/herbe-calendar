<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="128"/>
    </clipPath>
    <linearGradient id="glossArc" x1="0" y1="0" x2="0" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.30"/>
      <stop offset="85%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="black"/>

  <!-- Gloss overlay -->
  <g clip-path="url(#iconClip)">
    <ellipse cx="256" cy="-20" rx="340" ry="280" fill="url(#glossArc)"/>
  </g>

  <!-- "h" left-aligned with grid (x=122) -->
  <text x="109" y="262" fill="white" font-family="sans-serif" font-size="210" font-weight="700" text-anchor="start">h</text>
  <!-- Dot block (salmon rounded rect) -->
  <rect x="248" y="237" width="26" height="26" rx="5" fill="#f3816d"/>
  <!-- "c" right-aligned with grid end (x=391) -->
  <text x="280" y="262" fill="white" font-family="sans-serif" font-size="210" font-weight="700" text-anchor="start">c</text>

  <!-- Squares Grid: 45px blocks, 11px gaps -->
  <g transform="translate(122, 284)">
    <!-- Row 1 (5 blocks) -->
    <rect x="0" y="0" width="45" height="45" rx="4" fill="#88c1b5"/>
    <rect x="56" y="0" width="45" height="45" rx="4" fill="#a189b8"/>
    <rect x="112" y="0" width="45" height="45" rx="4" fill="#88c1b5"/>
    <rect x="168" y="0" width="45" height="45" rx="4" fill="#a189b8"/>
    <rect x="224" y="0" width="45" height="45" rx="4" fill="#f3816d"/>

    <!-- Row 2 (4 blocks) -->
    <rect x="0" y="56" width="45" height="45" rx="4" fill="#88c1b5"/>
    <rect x="56" y="56" width="45" height="45" rx="4" fill="#a189b8"/>
    <rect x="112" y="56" width="45" height="45" rx="4" fill="#f3816d"/>
    <rect x="168" y="56" width="45" height="45" rx="4" fill="#a189b8"/>
  </g>
</svg>
